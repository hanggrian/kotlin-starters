name: code-analysis

on: [push, pull_request]

env:
  GRADLE_USER_HOME: ${{ github.workspace }}/.gradle/
  GRADLE_OPTS: -Dorg.gradle.daemon=false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-workspace

      - run: ./gradlew check
